# Data Contracts: DFM Ingestion Standardisation

run_input_contract:
  parameters:
    period:
      type: string
      format: YYYY-MM
      required: true
    run_id:
      type: string
      format: YYYYMMDDTHHmmssZ
      required: false
  landing_zone:
    path_template: /Files/landing/period={period}/dfm={dfm_id}/source/
  required_config:
    - /Files/config/dfm_registry.json
    - /Files/config/raw_parsing_config.json
    - /Files/config/rules_config.json

source_dfm_raw:
  description: Stage 1 raw persistence contract
  columns:
    - { name: period, type: string, nullable: false }
    - { name: run_id, type: string, nullable: false }
    - { name: dfm_id, type: string, nullable: false }
    - { name: profile_id, type: string, nullable: false }
    - { name: source_file, type: string, nullable: false }
    - { name: source_sheet, type: string, nullable: true }
    - { name: source_row_id, type: string, nullable: false }
    - { name: raw_record_json, type: string, nullable: false }
    - { name: parse_status, type: string, nullable: false }
    - { name: parse_error_code, type: string, nullable: true }
    - { name: ingested_at, type: timestamp, nullable: false }

individual_dfm_consolidated:
  description: Stage 2 per-DFM canonical contract
  columns:
    - { name: period, type: string, nullable: false }
    - { name: run_id, type: string, nullable: false }
    - { name: dfm_id, type: string, nullable: false }
    - { name: profile_id, type: string, nullable: false }
    - { name: source_file, type: string, nullable: false }
    - { name: source_row_id, type: string, nullable: false }
    - { name: row_hash, type: string, nullable: false }
    - { name: policyholder_number, type: string, nullable: true }
    - { name: security_code, type: string, nullable: true }
    - { name: isin, type: string, nullable: true }
    - { name: sedol, type: string, nullable: true }
    - { name: other_security_id, type: string, nullable: true }
    - { name: id_type, type: string, nullable: true }
    - { name: asset_name, type: string, nullable: true }
    - { name: holding, type: decimal(28,8), nullable: false }
    - { name: local_bid_price, type: decimal(28,8), nullable: true }
    - { name: local_currency, type: string, nullable: true }
    - { name: fx_rate, type: decimal(28,8), nullable: true }
    - { name: cash_value_gbp, type: decimal(28,8), nullable: false }
    - { name: bid_value_gbp, type: decimal(28,8), nullable: true }
    - { name: accrued_interest_gbp, type: decimal(28,8), nullable: false }
    - { name: include_flag, type: string, nullable: false }
    - { name: exclusion_reason_code, type: string, nullable: true }
    - { name: identifier_chosen, type: string, nullable: true }
    - { name: decision_trace_json, type: string, nullable: true }
    - { name: data_quality_flags, type: array<string>, nullable: false }

aggregated_dfms_consolidated:
  description: Stage 3 consolidated contract
  columns:
    - { name: period, type: string, nullable: false }
    - { name: run_id, type: string, nullable: false }
    - { name: dfm_id, type: string, nullable: false }
    - { name: policyholder_number, type: string, nullable: true }
    - { name: security_code, type: string, nullable: true }
    - { name: isin, type: string, nullable: true }
    - { name: sedol, type: string, nullable: true }
    - { name: asset_name, type: string, nullable: true }
    - { name: holding, type: decimal(28,8), nullable: false }
    - { name: cash_value_gbp, type: decimal(28,8), nullable: false }
    - { name: bid_value_gbp, type: decimal(28,8), nullable: true }
    - { name: accrued_interest_gbp, type: decimal(28,8), nullable: false }
    - { name: source_count, type: int, nullable: false }

dq_results:
  description: Gate outcomes
  columns:
    - { name: period, type: string, nullable: false }
    - { name: run_id, type: string, nullable: false }
    - { name: dfm_id, type: string, nullable: false }
    - { name: check_id, type: string, nullable: false }
    - { name: severity, type: string, nullable: false }
    - { name: status, type: string, nullable: false }
    - { name: metric_value, type: double, nullable: true }
    - { name: threshold_value, type: double, nullable: true }
    - { name: details_json, type: string, nullable: true }

dq_exception_rows:
  description: Row-level failed controls
  columns:
    - { name: period, type: string, nullable: false }
    - { name: run_id, type: string, nullable: false }
    - { name: dfm_id, type: string, nullable: false }
    - { name: check_id, type: string, nullable: false }
    - { name: source_file, type: string, nullable: false }
    - { name: source_row_id, type: string, nullable: false }
    - { name: failure_reason, type: string, nullable: false }
    - { name: details_json, type: string, nullable: true }
